name: Tests

on:
  push:
    branches: [ main, vivas ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[dev,plt]"

    - name: Lint with type checking (mypy)
      run: |
        pip install mypy
        mypy pyanatem/ --ignore-missing-imports || true

    - name: Run pytest with coverage
      run: |
        pip install pytest pytest-cov
        pytest tests/ -v --cov=pyanatem --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,plt]"
        pip install flake8 black isort

    - name: Check code formatting (black)
      run: black --check pyanatem/ tests/

    - name: Check import sorting (isort)
      run: isort --check-only pyanatem/ tests/

    - name: Lint with flake8
      run: |
        flake8 pyanatem/ tests/ --max-line-length=120 --extend-ignore=E203,W503 || true
